<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skill Learning Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

.progress{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
}

.admin{
background:#222;
color:white;
padding:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Online Skill Platform</h1>

<div id="auth">

<div class="card">

<h3>Register</h3>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="registerBtn">Register</button>

</div>

<div class="card">

<h3>Login</h3>

<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>

<button id="loginBtn">Login</button>

</div>

</div>


<div id="dashboard" style="display:none">

<button onclick="logout()">Logout</button>

<h2>Welcome <span id="username"></span></h2>

<div class="card">

<h3>Trial Status</h3>

<div class="progress">
<div class="bar" id="trialBar"></div>
</div>

<p id="trialText"></p>

</div>

<div class="card">

<h3>Courses</h3>

<div id="courses"></div>

</div>

<div class="card" id="paymentBox" style="display:none"></div>

</div>


<div id="adminPanel" style="display:none" class="admin">

<h2>Admin Dashboard</h2>

<button onclick="loadUsers()">Load Users</button>

<div id="userList"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
