<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge Academy - Your Path to Government Jobs</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn.login {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .nav-btn.register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .hero-section {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease;
        }

        .hero-section h1 {
            font-size: 2.8rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            display: block;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .testimonial-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            transition: transform 0.3s ease;
            text-align: center;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .testimonial-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
            margin: 0 auto 1rem;
            display: block;
        }

        .testimonial-stars {
            color: #ffc107;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .testimonial-text {
            font-style: italic;
            margin-bottom: 1rem;
            color: #555;
        }

        .testimonial-name {
            font-weight: 600;
            color: #667eea;
            font-size: 1.2rem;
        }

        .testimonial-job {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .testimonial-grade {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            transform: translateY(-3px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2rem;
            }
            
            .stats-container {
                grid-template-columns: 1fr 1fr;
            }
            
            .cta-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-briefcase"></i> SkillForge Academy
        </div>
        <div class="nav-buttons">
            <a href="#" class="nav-btn login" onclick="showLoginPage()">Login</a>
            <a href="#" class="nav-btn register" onclick="showRegistrationPage()">Register</a>
        </div>
    </header>

    <div class="container">
        <!-- HERO SECTION WITH TESTIMONIALS -->
        <div id="heroSection" class="hero-section">
            <h1>🇰🇪 Your KCSE Grade is Your Key to Government Jobs</h1>
            <p>Pay KSH 150 to book your position • Get 2-day free trial • Unlock full access with KSH 200</p>
            
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-number">1,247+</span>
                    <span class="stat-label">Graduates</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number">856</span>
                    <span class="stat-label">Placed in Jobs</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number">73%</span>
                    <span class="stat-label">Success Rate</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number">KSH 58k</span>
                    <span class="stat-label">Avg. Salary</span>
                </div>
            </div>

            <!-- TESTIMONIALS SECTION WITH YOUR LINKS -->
            <h2 style="margin: 3rem 0 2rem; color: #667eea;">✨ Success Stories from Real Graduates</h2>
            <div class="testimonials-grid" id="featuredTestimonials">
                <!-- Testimonials will be loaded here by JavaScript -->
            </div>
            
            <div class="cta-buttons">
                <button class="btn btn-primary" onclick="showRegistrationPage()">
                    <i class="fas fa-lock"></i> Pay KSH 150 & Register
                </button>
                <button class="btn btn-secondary" onclick="showLoginPage()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== YOUR KENYAN TESTIMONIALS WITH YOUR EXACT LINKS =====
        const testimonials = [
            {
                name: "James Otieno",
                grade: "B+",
                job: "Tax Assistant",
                org: "KRA - Kenya Revenue Authority",
                story: "Nilipay KSH 150, nikajifunza kuhusu kazi za serikali, na baada ya miezi 3 nikaajiriwa KRA! Asante SkillForge!",
                image: "https://images.pexels.com/photos/5792980/pexels-photo-5792980.jpeg",
                stars: 5
            },
            {
                name: "Mary Wanjiku",
                grade: "C",
                job: "Customer Service",
                org: "Huduma Kenya - Nyeri",
                story: "Sikujua ni kazi gani ningepata na C plain yangu. Kozi hii ilionyesha nafasi 185 za serikali! Sasa niko Huduma Nyeri.",
                image: "https://images.pexels.com/photos/1390128/pexels-photo-1390128.jpeg",
                stars: 5
            },
            {
                name: "Peter Kamau",
                grade: "Adult",
                job: "ICT Officer",
                org: "ICT Authority",
                story: "Mimi mwanafunzi mzima nilidhani kazi za serikali ni ngumu. Sasa niko ICT Authority! Usikate tamaa.",
                image: "https://images.pexels.com/photos/35165475/pexels-photo-35165475.jpeg",
                stars: 5
            },
            {
                name: "Faith Akinyi",
                grade: "A-",
                job: "Compliance Officer",
                org: "CMA - Capital Markets Authority",
                story: "Niliomba nafasi 8, nikaitwa interview 3, sasa niko CMA! KSH 150 ilikuwa investment bora kabisa.",
                image: "https://images.pexels.com/photos/1255010/pexels-photo-1255010.jpeg",
                stars: 5
            },
            {
                name: "John Mwangi",
                grade: "C",
                job: "Clerk",
                org: "County Government of Kiambu",
                story: "County zinaajiri watu wengi wa C plain. Sasa niko permanent na pension! Nashukuru.",
                image: "https://images.pexels.com/photos/29079409/pexels-photo-29079409.jpeg",
                stars: 5
            },
            {
                name: "Lucy Wambui",
                grade: "B",
                job: "IT Support",
                org: "Huduma Kenya",
                story: "Nililipa KSH 150, KSH 200, na KSH 500 kwa cheti. Yote ilifaa! Sasa niko na kazi nzuri.",
                image: "https://images.pexels.com/photos/35081993/pexels-photo-35081993.jpeg",
                stars: 5
            }
        ];

        // ===== LOAD TESTIMONIALS =====
        function loadTestimonials() {
            const container = document.getElementById('featuredTestimonials');
            if (!container) return;
            
            container.innerHTML = testimonials.map(t => `
                <div class="testimonial-card">
                    <img src="${t.image}" 
                         alt="${t.name}" 
                         class="testimonial-image"
                         onerror="this.onerror=null; this.src='https://images.pexels.com/photos/5792980/pexels-photo-5792980.jpeg';">
                    <div class="testimonial-stars">${'⭐'.repeat(t.stars)}</div>
                    <p class="testimonial-text">"${t.story}"</p>
                    <div class="testimonial-name">${t.name}</div>
                    <div class="testimonial-job">${t.job} - ${t.org}</div>
                    <span class="testimonial-grade">KCSE: ${t.grade}</span>
                </div>
            `).join('');
        }

        // ===== PAGE NAVIGATION (Placeholder functions) =====
        function showLoginPage() {
            alert("Login page would open here");
        }

        function showRegistrationPage() {
            alert("Registration page would open here");
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            loadTestimonials();
        });
    </script>
</body>
</html>
