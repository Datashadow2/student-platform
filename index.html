    // ===== LOAD TESTIMONIALS =====
    function loadTestimonials() {
        const container = document.getElementById('featuredTestimonials');
        if (!container) return;
        
        container.innerHTML = testimonials.map(t => `
            <div class="testimonial-card">
                <img src="${t.image}" 
                     alt="${t.name}" 
                     class="testimonial-image"
                     onerror="this.onerror=null; this.src='https://images.pexels.com/photos/5792980/pexels-photo-5792980.jpeg';">
                <div class="testimonial-stars">${'⭐'.repeat(t.stars)}</div>
                <p class="testimonial-text">"${t.story}"</p>
                <div class="testimonial-name">${t.name}</div>
                <div class="testimonial-job">${t.job} - ${t.org}</div>
                <span class="testimonial-grade">KCSE: ${t.grade}</span>
            </div>
        `).join('');
    }

    // ===== REAL PAGE NAVIGATION FUNCTIONS =====
    function showHeroSection() {
        document.getElementById('heroSection').style.display = 'block';
        // Hide other sections if they exist
    }

    function showLoginPage() {
        // Hide hero section
        document.getElementById('heroSection').style.display = 'none';
        
        // Create login form if it doesn't exist
        let loginDiv = document.getElementById('loginPage');
        if (!loginDiv) {
            loginDiv = document.createElement('div');
            loginDiv.id = 'loginPage';
            loginDiv.className = 'container';
            loginDiv.innerHTML = `
                <div style="background: white; border-radius: 30px; padding: 3rem; max-width: 500px; margin: 0 auto;">
                    <h2 style="color: #667eea; text-align: center; margin-bottom: 2rem;">🔐 Admin Login</h2>
                    <form onsubmit="event.preventDefault(); adminLogin()">
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem;">Email:</label>
                            <input type="email" id="adminEmail" value="admin@skillforge.com" 
                                   style="width: 100%; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 15px;">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem;">Password:</label>
                            <input type="password" id="adminPass" value="admin123" 
                                   style="width: 100%; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 15px;">
                        </div>
                        <button type="submit" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 15px; font-size: 1.1rem; cursor: pointer;">
                            Login to Admin Panel
                        </button>
                    </form>
                    <p style="text-align: center; margin-top: 2rem;">
                        <a href="#" onclick="showHeroSection()" style="color: #667eea;">← Back to Home</a>
                    </p>
                </div>
            `;
            document.querySelector('.container').appendChild(loginDiv);
        }
        loginDiv.style.display = 'block';
    }

    function showRegistrationPage() {
        alert("🚀 Registration form would open here. Please implement the full registration form.");
    }

    function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;
        
        if (email === 'admin@skillforge.com' && pass === 'admin123') {
            document.getElementById('loginPage').style.display = 'none';
            showAdminPanel();
        } else {
            alert('❌ Invalid credentials! Use admin@skillforge.com / admin123');
        }
    }

    function showAdminPanel() {
        let adminDiv = document.getElementById('adminPanel');
        if (!adminDiv) {
            adminDiv = document.createElement('div');
            adminDiv.id = 'adminPanel';
            adminDiv.className = 'container';
            adminDiv.innerHTML = `
                <div style="background: white; border-radius: 30px; padding: 3rem;">
                    <h2 style="color: #667eea; margin-bottom: 2rem;">🔐 Admin Panel - Pending Approvals</h2>
                    
                    <div style="margin-bottom: 2rem;">
                        <h3>📝 Pending Registrations (KSH 150)</h3>
                        <div id="pendingRegistrations">
                            <p>Loading pending users from Supabase...</p>
                            <p><small>Note: You need to connect Supabase first</small></p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        <p><a href="#" onclick="showHeroSection()" style="color: #667eea;">← Back to Home</a></p>
                    </div>
                </div>
            `;
            document.querySelector('.container').appendChild(adminDiv);
        }
        adminDiv.style.display = 'block';
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
        loadTestimonials();
    });
</script>
