        // ===== HEARTS SYSTEM =====
        function getHearts(user) {
            if (!user.hearts) user.hearts = 5;
            if (!user.lastHeartRegen) user.lastHeartRegen = Date.now();
            
            // Check if 2.5 hours passed (2.5 * 60 * 60 * 1000 = 9,000,000 ms)
            const timeSinceLastRegen = Date.now() - user.lastHeartRegen;
            const regenInterval = 2.5 * 60 * 60 * 1000;
            
            if (timeSinceLastRegen >= regenInterval && user.hearts < 5) {
                user.hearts = 5;
                user.lastHeartRegen = Date.now();
                saveUsers();
            }
            
            return user.hearts;
        }

        function useHeart(user) {
            if (user.hearts > 0) {
                user.hearts--;
                if (user.hearts === 0) {
                    user.lastHeartRegen = Date.now();
                }
                saveUsers();
                return true;
            }
            return false;
        }

        function getLockoutTimeRemaining(user) {
            if (user.hearts > 0) return 0;
            
            const timeSinceLastRegen = Date.now() - user.lastHeartRegen;
            const regenInterval = 2.5 * 60 * 60 * 1000;
            const timeRemaining = regenInterval - timeSinceLastRegen;
            
            return Math.max(0, timeRemaining);
        }

        function formatLockoutTime(ms) {
            const hours = Math.floor(ms / (60 * 60 * 1000));
            const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
            
            const unlockTime = new Date(Date.now() + ms);
            const timeString = unlockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            return {
                display: `${hours}h ${minutes}m`,
                unlockTime: timeString
            };
        }

                        <div class="lesson-progress">
                            <strong>5 questions • ${lesson.quiz.length} topics</strong>
                        </div>
                        
                        ${!isCompleted && !isLocked ? `
                            <button class="btn btn-primary" onclick="startLesson(${index})" style="width: auto;" ${hearts === 0 ? 'disabled' : ''}>
                                <i class="fas fa-play"></i> START LESSON
                            </button>
                        ` : ''}
                        
                        ${isLocked ? '<p style="color: #666; margin-top: 1rem;">🔒 Complete previous lesson to unlock</p>' : ''}
                        
                        ${isCompleted ? `
                            <button class="btn btn-success" style="width: auto; background: #28a745;" disabled>
                                <i class="fas fa-check"></i> COMPLETED
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            dashboardHtml += `</div>`;
            
            // Show certificate option only after all lessons completed
            if (allLessonsCompleted) {
                dashboardHtml += `
                    <div class="certificate-section">
                        <i class="fas fa-certificate" style="font-size: 3rem; color: var(--govt-gold);"></i>
                        <h3>🎓 GET YOUR CERTIFICATE</h3>
                        <p>You've completed all ${lessons.length} lessons! Pay KSH 500 to receive your verified certificate.</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap;">
                            <input type="text" id="certMpesa" placeholder="Enter M-PESA code" style="padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; width: 300px;">
                            <button class="btn btn-success" onclick="purchaseCertificate()" style="width: auto;">GET CERTIFICATE</button>
                        </div>
                    </div>
                `;
            }
            
            dashboardHtml += `</div>`;
            document.getElementById('mainContainer').innerHTML = dashboardHtml;
        }

        // ===== START LESSON WITH QUIZ =====
        function startLesson(lessonIndex) {
            if (!currentUser) return;
            
            const hearts = getHearts(currentUser);
            if (hearts === 0) {
                const lockout = getLockoutTimeRemaining(currentUser);
                const timeData = formatLockoutTime(lockout);
                alert(`❌ No hearts left! Come back at ${timeData.unlockTime}`);
                return;
            }
            
            const lesson = lessons[lessonIndex];
            let currentQuestion = 0;
            let quizHearts = hearts;
            
            // Close any existing modal
            if (activeModal) {
                document.body.removeChild(activeModal);
                activeModal = null;
            }
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            
            function showLessonContent() {
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3><i class="fas fa-${lesson.icon}"></i> ${lesson.title}</h3>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        
                        <div style="max-height: 400px; overflow-y: auto; padding: 1rem; background: #f8f9fa; border-radius: 8px; margin: 1rem 0;">
                            ${lesson.content}
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button class="btn btn-primary" onclick="startQuiz()">START QUIZ (5 Questions)</button>
                            <button class="btn" style="background: #6c757d; color: white;" onclick="closeModal()">CLOSE</button>
                        </div>
                    </div>
                `;
            }
            
            function startQuiz() {
                currentQuestion = 0;
                quizHearts = hearts;
                showQuestion();
            }
            
            function showQuestion() {
                if (currentQuestion >= lesson.quiz.length) {
                    // Lesson completed
                    if (!currentUser.completedLessons) currentUser.completedLessons = [];
                    if (!currentUser.completedLessons.includes(lesson.id)) {
                        currentUser.completedLessons.push(lesson.id);
                        saveUsers();
                    }
                    
                    modal.innerHTML = `
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>🎉 LESSON COMPLETE!</h3>
                                <button class="modal-close" onclick="closeModal()">&times;</button>
                            </div>
                            <div style="text-align: center; padding: 2rem;">
                                <i class="fas fa-trophy" style="font-size: 4rem; color: var(--govt-gold);"></i>
                                <p style="font-size: 1.2rem; margin: 1rem 0;">You've completed ${lesson.title}!</p>
                                <button class="btn btn-primary" onclick="closeModal()">CONTINUE</button>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                const q = lesson.quiz[currentQuestion];
                
                let heartsHtml = '';
                for (let i = 0; i < 5; i++) {
                    heartsHtml += `<i class="fas fa-heart quiz-heart ${i < quizHearts ? '' : 'empty'}"></i>`;
                }
                
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>${lesson.title} - Question ${currentQuestion + 1}/${lesson.quiz.length}</h3>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        
                        <div class="quiz-hearts">${heartsHtml}</div>
                        
                        <p style="font-size: 1.2rem; margin: 1rem 0;">${q.question}</p>
                        
                        <div>
                            ${q.options.map((opt, i) => `
                                <button class="quiz-option" onclick="selectAnswer(${i})" id="opt_${i}">
                                    ${String.fromCharCode(65 + i)}. ${opt}
                                </button>
                            `).join('')}
                        </div>
                        
                        <button class="btn btn-primary" onclick="submitAnswer()" style="margin-top: 1rem;" id="submitBtn">SUBMIT ANSWER</button>
                    </div>
                `;
                
                window.selectedAnswer = null;
                
                window.selectAnswer = (index) => {
                    window.selectedAnswer = index;
                    document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                    document.getElementById(`opt_${index}`).classList.add('selected');
                };
                
                window.submitAnswer = () => {
                    if (window.selectedAnswer === undefined || window.selectedAnswer === null) {
                        alert('Please select an answer');
                        return;
                    }
                    
                    const correct = q.correct;
                    const isCorrect = window.selectedAnswer === correct;
                    
                    // Show result
                    document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                    document.getElementById(`opt_${window.selectedAnswer}`).classList.add(isCorrect ? 'correct' : 'wrong');
                    document.getElementById(`opt_${correct}`).classList.add('correct');
                    
                    if (!isCorrect) {
                        quizHearts--;
                        useHeart(currentUser);
                        
                        if (quizHearts === 0) {
                            // Game over
                            setTimeout(() => {
                                const lockout = getLockoutTimeRemaining(currentUser);
                                const timeData = formatLockoutTime(lockout);
                                modal.innerHTML = `
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h3>💔 GAME OVER</h3>
                                            <button class="modal-close" onclick="closeModal()">&times;</button>
                                        </div>
                                        <div class="lockout-message">
                                            <i class="fas fa-clock" style="font-size: 3rem;"></i>
                                            <h3>No hearts remaining!</h3>
                                            <p>Come back at <strong>${timeData.unlockTime}</strong></p>
                                            <p>(${timeData.display} remaining)</p>
                                        </div>
                                        <button class="btn btn-primary" onclick="closeModal()">OK</button>
                                    </div>
                                `;
                            }, 1500);
                            return;
                        }
                    }
                    
                    setTimeout(() => {
                        if (isCorrect) {
                            currentQuestion++;
                            showQuestion();
                        } else {
                            // Wrong answer - retry same question
                            document.querySelectorAll('.quiz-option').forEach(opt => {
                                opt.classList.remove('correct', 'wrong', 'selected');
                            });
                            document.getElementById('submitBtn').disabled = false;
                        }
                    }, 1500);
                    
                    document.getElementById('submitBtn').disabled = true;
                };
            }
            
            showLessonContent();
            document.body.appendChild(modal);
            activeModal = modal;
            
            window.startQuiz = startQuiz;
        }

        // ===== CLOSE MODAL =====
        function closeModal() {
            if (activeModal) {
                document.body.removeChild(activeModal);
                activeModal = null;
            }
            loadDashboard();
        }

        // ===== PURCHASE CERTIFICATE =====
        function purchaseCertificate() {
            const code = document.getElementById('certMpesa').value;
            if (!code || code.length < 5) {
                alert('❌ Please enter a valid M-PESA code');
                return;
            }
            alert('✅ Certificate payment of KSH 500 submitted! You will receive your certificate soon.');
            document.getElementById('certMpesa').value = '';
        }

        // ===== LOGIN =====
        function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            const user = users.find(u => u.email === email && u.password === pass);
            
            if (!user) {
                alert('❌ Invalid email or password');
                return;
            }
            
            currentUser = user;
            
            if (user.role === 'admin') {
                document.getElementById('mainContainer').innerHTML = '<h2>Admin Panel</h2><p>Admin functions here</p>';
            } else {
                loadDashboard();
            }
        }

        // ===== REGISTER =====
        function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const grade = document.getElementById('regGrade').value;
            
            if (!name || !email || !pass || !grade) {
                alert('❌ Please fill all fields');
                return;
            }
            
            if (users.some(u => u.email === email)) {
                alert('❌ Email already registered');
                return;
            }
            
            const newUser = {
                id: users.length + 1,
                name,
                email,
                password: pass,
                kcse: grade,
                role: 'user',
                status: 'approved',
                completedLessons: [],
                hearts: 5,
                lastHeartRegen: Date.now()
            };
            
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            loadDashboard();
        }

        // ===== SHOW SECTION =====
        function showSection(section) {
            if (section === 'hero') {
                loadHeroSection();
            } else if (section === 'login') {
                document.getElementById('mainContainer').innerHTML = `
                    <div class="auth-container">
                        <h2>LOGIN</h2>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPass" placeholder="Enter your password">
                        </div>
                        <button class="btn btn-primary" onclick="login()">LOGIN</button>
                        <div class="back-link">
                            <a onclick="showSection('hero')">← Back to Home</a>
                        </div>
                    </div>
                `;
            } else if (section === 'register') {
                document.getElementById('mainContainer').innerHTML = `
                    <div class="auth-container">
                        <h2>REGISTER - KSH 150</h2>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" placeholder="e.g., James Otieno">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" placeholder="you@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password (min. 6 chars)</label>
                            <input type="password" id="regPass" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>KCSE Grade</label>
                            <select id="regGrade">
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B">B</option>
                                <option value="C+">C+</option>
                                <option value="C">C</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="register()">REGISTER</button>
                        <div class="back-link">
                            <a onclick="showSection('hero')">← Back to Home</a>
                        </div>
                    </div>
                `;
            }
        }

        // ===== LOGOUT =====
        function logout() {
            currentUser = null;
            showSection('hero');
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            showSection('hero');
        });

        // Make functions global
        window.showSection = showSection;
        window.login = login;
        window.register = register;
        window.logout = logout;
        window.startLesson = startLesson;
        window.closeModal = closeModal;
        window.purchaseCertificate = purchaseCertificate;
    </script>
</body>
</html>
